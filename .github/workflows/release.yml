name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Package VSIX
        run: npm run package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-browser-plus.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
